name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Go test, vet, race, perf smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libolm-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race test connector
        run: go test -race ./connector

      - name: Test performance tooling
        run: python3 -m unittest scripts/perf_metrics_test.py -v

      - name: Performance smoke benchmark
        run: BENCH_COUNT=1 PERF_ENFORCE_GATES=1 ./scripts/perf.sh

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf-results/
          if-no-files-found: ignore
